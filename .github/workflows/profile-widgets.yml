name: Update profile widgets

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:
  push:
    branches: [master, main]
    paths:
      - ".github/workflows/profile-widgets.yml"

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate stats card
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: stats
          options: >-
            username=${{ github.repository_owner }}&show_icons=true&theme=radical&hide_border=true&bg_color=0D1117&title_color=C4B5FD&icon_color=A78BFA&text_color=E5E7EB
          path: profile/stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate top languages card
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: top-langs
          options: >-
            username=${{ github.repository_owner }}&layout=compact&theme=radical&hide_border=true&bg_color=0D1117&title_color=C4B5FD&text_color=E5E7EB
          path: profile/top-langs.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate streak stats
        uses: DenverCoder1/github-readme-streak-stats@main
        with:
          options: >-
            user=${{ github.repository_owner }}&theme=radical&hide_border=true&background=0D1117&ring=7C3AED&fire=A78BFA&currStreakLabel=C4B5FD&disable_animations=true
          path: profile/streak.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate snake
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            profile/snake-dark.svg?palette=github-dark

      - name: Refresh typing / views / followers badges
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OWNER: ${{ github.repository_owner }}
        run: |
          set -euo pipefail
          mkdir -p profile /tmp/widget-refresh

          # Best-effort refresh from generators. Keep previous SVG if a host is down.
          curl -fsSL --max-time 30 -o /tmp/widget-refresh/typing.svg \
            'https://readme-typing-svg.demolab.com?font=Fira+Code&weight=500&size=18&pause=1200&color=C4B5FD&center=true&vCenter=true&width=640&lines=Observe+the+system;Connect+the+evidence;Explain+the+attack' \
            && mv /tmp/widget-refresh/typing.svg profile/typing.svg \
            || echo "typing refresh skipped"

          curl -fsSL --max-time 30 -o /tmp/widget-refresh/views.svg \
            "https://komarev.com/ghpvc/?username=${OWNER}&label=Profile%20views&color=5B21B6&style=flat-square" \
            && mv /tmp/widget-refresh/views.svg profile/views.svg \
            || echo "views refresh skipped"

          # Followers badge from GitHub API — no shields.io dependency.
          followers="$(gh api "users/${OWNER}" --jq '.followers')"
          python3 - "$followers" <<'PY'
          import sys
          from pathlib import Path
          n = sys.argv[1]
          label, value, color = "Followers", str(n), "7C3AED"
          lw = max(40, int(len(label) * 7 + 20))
          vw = max(40, int(len(value) * 7 + 20))
          w, h = lw + vw, 20
          Path("profile/followers.svg").write_text(f'''<svg xmlns="http://www.w3.org/2000/svg" width="{w}" height="{h}" role="img" aria-label="{label}: {value}">
            <title>{label}: {value}</title>
            <linearGradient id="s" x2="0" y2="100%"><stop offset="0" stop-color="#bbb" stop-opacity=".1"/><stop offset="1" stop-opacity=".1"/></linearGradient>
            <clipPath id="r"><rect width="{w}" height="{h}" rx="3" fill="#fff"/></clipPath>
            <g clip-path="url(#r)">
              <rect width="{lw}" height="{h}" fill="#555"/>
              <rect x="{lw}" width="{vw}" height="{h}" fill="#{color}"/>
              <rect width="{w}" height="{h}" fill="url(#s)"/>
            </g>
            <g fill="#fff" text-anchor="middle" font-family="Verdana,Geneva,DejaVu Sans,sans-serif" text-rendering="geometricPrecision" font-size="11">
              <text x="{lw/2}" y="14">{label}</text>
              <text x="{lw + vw/2}" y="14">{value}</text>
            </g>
          </svg>
          ''')
          PY

      - name: Commit widgets
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/*.svg
          git commit -m "Update profile widget SVGs" || exit 0
          git push
